# MySQL only — mirrors .github/workflows/e2e.yml `services.mysql`.
# Use with bin/e2e-local.sh so Playwright hits `wp server` on the host while
# the database runs in Docker (avoids a local MySQL install).
#
#   docker compose -f docker-compose.e2e.yml up -d
#   E2E_DB_PORT=3307 bash bin/e2e-local.sh provision
#
# Default published port is 3307 so a host MySQL on 3306 does not conflict.
# Override: E2E_MYSQL_PUBLISH=3306 docker compose -f docker-compose.e2e.yml up -d

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
    ports:
      - "${E2E_MYSQL_PUBLISH:-3307}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 24
