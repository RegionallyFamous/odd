<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="robots" content="noindex">
	<title>Launching ODD Playground…</title>
	<link rel="canonical" href="https://odd.regionallyfamous.com/playground/">
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="stylesheet" href="/styles.css?v=4">
	<script>
		( function () {
			'use strict';
			// Query string busts Playground/browser caches when the blueprint shape changes.
			var blueprint = 'https://odd.regionallyfamous.com/playground/blueprint.json?oddbp=wporg-odd-1.1.0-dm-0.8.5';
			var target = 'https://playground.wordpress.net/?blueprint-url=' + encodeURIComponent( blueprint );
			window.location.replace( target );
		} )();
	</script>
	<noscript>
			<meta http-equiv="refresh" content="0; url=https://playground.wordpress.net/?blueprint-url=https%3A%2F%2Fodd.regionallyfamous.com%2Fplayground%2Fblueprint.json%3Foddbp%3Dwporg-odd-1.1.0-dm-0.8.5">
	</noscript>
</head>
<body>
	<main class="shell hero">
		<div>
			<div class="kicker">Launching</div>
			<h1>Opening ODD in WordPress Playground.</h1>
			<p class="lede">If you are not redirected automatically, use the button below.</p>
			<div class="actions">
				<a class="button primary" href="https://playground.wordpress.net/?blueprint-url=https%3A%2F%2Fodd.regionallyfamous.com%2Fplayground%2Fblueprint.json%3Foddbp%3Dwporg-odd-1.1.0-dm-0.8.5">Open Playground</a>
				<a class="button" href="/playground/dev/">Trunk preview (dev)</a>
				<a class="button" href="/">Back to ODD</a>
			</div>
		</div>
	</main>
</body>
</html>
