name: e2e

# Playwright end-to-end against a real WordPress install with ODD
# activated. Picks up JS regressions that install-smoke misses
# because install-smoke never loads a browser.
#
# One combined smoke test (see e2e/panel.spec.ts) covering wallpaper mount,
# ODD Shop axe, and shop rail / preview interactions — no duplicate login/shell
# boot. `playwright-report` artifact on failure.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # One ~2.5m test + setup; 20m is plenty; avoids hanging the queue.
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WP_CLI_ALLOW_ROOT: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, zip, dom, gd
          coverage: none
          tools: wp-cli

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install node deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: |
          for attempt in 1 2 3; do
            if npx playwright install chromium --with-deps; then
              exit 0
            fi
            echo "Playwright browser install failed on attempt ${attempt}; retrying after mirror/DNS cooldown..."
            sleep $(( attempt * 20 ))
          done
          npx playwright install chromium --with-deps

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "mysql ready"; exit 0
            fi
            sleep 2
          done
          echo "mysql never came up" >&2; exit 1

      - name: Provision WordPress
        working-directory: /tmp
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download
          wp config create \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1 \
            --skip-check
          wp core install \
            --url=http://127.0.0.1:8080 \
            --title=ODD-e2e \
            --admin_user=admin \
            --admin_password=password \
            --admin_email=e2e@example.com \
            --skip-email

      - name: Install WP Desktop Mode (host plugin)
        working-directory: /tmp/wp
        # Use the mirrored packaged zip (includes compiled assets/js/desktop.min.js
        # and assets/vendor/pixi.min.js) rather than a source archive, which
        # ships only the TypeScript sources and 404s desktop.min.js at runtime.
        run: wp plugin install desktop-mode --activate

      - name: Link ODD into wp-content/plugins
        run: |
          ln -s "${{ github.workspace }}/odd" /tmp/wp/wp-content/plugins/odd
          cd /tmp/wp && wp plugin activate odd

      - name: Enable desktop mode for admin
        working-directory: /tmp/wp
        run: wp user meta update 1 desktop_mode_mode 1

      - name: Install starter pack from remote catalog
        working-directory: /tmp/wp
        # ODD content installs from the remote catalog. Call the
        # starter installer directly so the starter scene + icon set
        # land on disk before Playwright boots the browser.
        run: |
          wp eval '$r = odd_starter_install_now(); if (is_wp_error($r)) { fwrite(STDERR, $r->get_error_message() . "\n"); exit(1); } var_export($r);'

      - name: Pre-install a catalog app for Playwright (iframe smoke)
        working-directory: /tmp/wp
        run: |
          wp eval '$reg = odd_catalog_refresh(); $slug = "board"; if (function_exists("odd_bundle_catalog_installed_versions") && array_key_exists($slug, odd_bundle_catalog_installed_versions())) { fwrite(STDOUT, "e2e: app already installed\n"); exit(0); } $entry = null; foreach ((array) ($reg["bundles"] ?? array()) as $e) { if ((isset($e["type"], $e["slug"]) && $e["type"] === "app" && $e["slug"] === $slug)) { $entry = $e; break; } } if (!$entry) { fwrite(STDERR, "e2e: catalog missing app {$slug}\n"); exit(1);} $r = odd_catalog_install_entry($entry); if (is_wp_error($r)) { fwrite(STDERR, $r->get_error_message() . "\n"); exit(1);} var_export($r);'

      - name: Select the ODD canvas wallpaper for admin
        working-directory: /tmp/wp
        # Desktop Mode's built-in wallpaper picker defaults to the
        # `dark` CSS gradient, which means ODD's canvas wallpaper
        # mount() never runs — and since the shell only loads PIXI on
        # demand via `needs: ['pixijs']` when a `type: canvas` wallpaper
        # actually mounts, `window.PIXI` would stay undefined forever
        # and Playwright would hang waiting for it. Force the admin's
        # Desktop Mode wallpaper to `odd` so the shell loads PIXI and
        # mounts the scene engine on first paint. Writing user meta
        # directly (rather than via desktop_mode_save_os_settings)
        # sidesteps the sanitizer which re-stamps the full settings
        # shape; read-side merges defaults in from its own code path.
        run: |
          wp user meta update 1 desktop_mode_os_settings '{"wallpaper":"odd"}' --format=json
          wp eval 'var_export( desktop_mode_get_os_settings( 1 ) );'

      - name: Pretty permalinks for REST (/wp-json) on wp server
        working-directory: /tmp/wp
        run: |
          wp option update permalink_structure '/%postname%/'
          wp rewrite flush --hard

      - name: Start WP server
        working-directory: /tmp/wp
        run: |
          nohup wp server --host=127.0.0.1 --port=8080 > /tmp/wp-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              echo "wp server ready"; exit 0
            fi
            sleep 1
          done
          echo "wp server never came up" >&2
          cat /tmp/wp-server.log || true
          exit 1

      - name: Run Playwright e2e
        env:
          BASE_URL: http://127.0.0.1:8080
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: password
        run: npx playwright test

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
